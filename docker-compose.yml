services:
  kafka-init:
    image: apache/kafka:3.9.2
    container_name: kafka-init
    user: "0:0"
    entrypoint: ["/bin/sh", "-c"]
    command: ["chown -R 1000:1000 /tmp/kraft-combined-logs"]
    volumes:
      - kafka_data:/tmp/kraft-combined-logs

  kafka:
    image: apache/kafka:3.9.2
    container_name: kafka
    hostname: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      # Single-node KRaft: this process is both the broker and controller.
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Internal clients use kafka:9092; host clients use localhost:9092.
      KAFKA_LISTENERS: CONTROLLER://:29093,PLAINTEXT_HOST://:9092,PLAINTEXT://:19092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_MIN_INSYNC_REPLICAS: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:19092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy

  schema-registry:
    image: confluentinc/cp-schema-registry:7.9.2
    container_name: schema-registry
    hostname: schema-registry
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:19092
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: "1"
      SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL: BACKWARD
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8081/subjects >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  kafka-topic-init:
    image: apache/kafka:3.9.2
    container_name: kafka-topic-init
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic fraud.transaction --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic fraud.transaction.label --partitions 3 --replication-factor 1
    depends_on:
      kafka:
        condition: service_healthy

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio
    hostname: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: fraudguard
      MINIO_ROOT_PASSWORD: fraudguard-secret
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: minio-init
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mc alias set local http://minio:9000 fraudguard fraudguard-secret
        mc mb --ignore-existing local/fraud-lake
    depends_on:
      minio:
        condition: service_healthy

  hive-metastore-db:
    image: postgres:16-alpine
    container_name: hive-metastore-db
    hostname: hive-metastore-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive-password
    volumes:
      - hive_metastore_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  hive-metastore:
    build:
      context: .
      dockerfile: docker/hive/Dockerfile
    container_name: hive-metastore
    hostname: hive-metastore
    restart: unless-stopped
    ports:
      - "9083:9083"
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      HIVE_CUSTOM_CONF_DIR: /hive_custom_conf
      SERVICE_OPTS: >-
        -Xmx1G
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://hive-metastore-db:5432/metastore
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive-password
        -Dmetastore.try.direct.sql.ddl=false
    volumes:
      - ./docker/hive/conf:/hive_custom_conf:ro
    depends_on:
      hive-metastore-db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/9083'"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  spark-master:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    container_name: spark-master
    hostname: spark-master
    restart: unless-stopped
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    ports:
      - "7077:7077"
      - "8083:8080"
    volumes:
      - ./docker/spark/conf:/opt/spark/conf/custom:ro
    environment:
      SPARK_CONF_DIR: /opt/spark/conf/custom
    depends_on:
      hive-metastore:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/7077'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  spark-worker:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    container_name: spark-worker
    hostname: spark-worker
    restart: unless-stopped
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - --webui-port
      - "8081"
      - --cores
      - "2"
      - --memory
      - 2G
      - spark://spark-master:7077
    ports:
      - "8082:8081"
    environment:
      SPARK_CONF_DIR: /opt/spark/conf/custom
    volumes:
      - ./docker/spark/conf:/opt/spark/conf/custom:ro
      - spark_worker_data:/opt/spark/work
    depends_on:
      spark-master:
        condition: service_healthy

volumes:
  kafka_data:
  minio_data:
  hive_metastore_db:
  spark_worker_data:
