fraudguard:
  target: dev
  outputs:
    dev:
      type: clickhouse
      host: "{{ env_var('DBT_CLICKHOUSE_HOST', 'localhost') }}"
      port: "{{ env_var('DBT_CLICKHOUSE_PORT', '8123') | int }}"
      schema: "{{ env_var('DBT_CLICKHOUSE_DATABASE', 'fraudguard') }}"
      user: "{{ env_var('DBT_CLICKHOUSE_USER', 'fraudguard') }}"
      password: "{{ env_var('DBT_CLICKHOUSE_PASSWORD', 'fraudguard-secret') }}"
      secure: false
      verify: false
      connect_timeout: 10
      send_receive_timeout: 300
      threads: "{{ env_var('DBT_CLICKHOUSE_THREADS', '4') | int }}"
