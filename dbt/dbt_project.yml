name: fraudguard
version: "1.0.0"
config-version: 2

profile: fraudguard

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: target
clean-targets:
  - target
  - dbt_packages
  - logs

models:
  fraudguard:
    staging:
      +schema: staging
      +materialized: view
      +tags: ["staging"]

    intermediate:
      +schema: intermediate
      +materialized: view
      +tags: ["intermediate"]

    marts:
      +schema: mart
      +materialized: table
      +tags: ["superset", "analytics"]

    monitoring:
      +schema: monitoring
      +materialized: table
      +tags: ["superset", "monitoring"]