x-airflow-common: &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-fraudguard-airflow:3.2.2}
  environment: &airflow-common-environment
    AIRFLOW_UID: ${AIRFLOW_UID:-50000}
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-hgPKSTYIPpMXRW2s03MChhIa0FHLryflFNzG4FO1164=}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__PARALLELISM: ${AIRFLOW_PARALLELISM:-2}
    AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: ${AIRFLOW_MAX_ACTIVE_TASKS_PER_DAG:-2}
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-apiserver:8080/execution/
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_POSTGRES_PASSWORD:-airflow}@airflow-postgres/airflow
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_API_JWT_SECRET:-fraudguard-local-jwt-secret-change-me}
    AIRFLOW__API_AUTH__JWT_ISSUER: airflow
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    AIRFLOW__DAG_PROCESSOR__PARSING_PROCESSES: "1"
    # Airflow connection ID: clickhouse_http. The HTTP port is used by
    # clickhouse-connect; 9000 is ClickHouse's native protocol port.
    AIRFLOW_CONN_CLICKHOUSE_HTTP: >-
      {"conn_type":"http","host":"clickhouse","port":8123,"login":"${CLICKHOUSE_LOADER_USER:-fraudguard_loader}","password":"${CLICKHOUSE_LOADER_PASSWORD:?CLICKHOUSE_LOADER_PASSWORD must be set}","schema":"fraudguard"}
    # Airflow connection ID: minio_s3. Path-style addressing is required for
    # the local S3-compatible endpoint.
    AIRFLOW_CONN_MINIO_S3: >-
      {"conn_type":"aws","login":"${MINIO_AIRFLOW_USER:-fraudguard}","password":"${MINIO_AIRFLOW_PASSWORD:-fraudguard-secret}","extra":{"endpoint_url":"http://minio:9000","region_name":"us-east-1","config_kwargs":{"s3":{"addressing_style":"path"}}}}
    AIRFLOW_CONFIG: /opt/airflow/config/airflow.cfg
    PYTHONDONTWRITEBYTECODE: "1"
  user: "${AIRFLOW_UID:-50000}:0"
  volumes:
    - ./airflow/dags:/opt/airflow/dags:ro
    - ./airflow/plugins:/opt/airflow/plugins:ro
    - airflow_logs:/opt/airflow/logs
    - airflow_config:/opt/airflow/config
  depends_on: &airflow-common-depends-on
    airflow-postgres:
      condition: service_healthy
    minio-init:
      condition: service_completed_successfully

services:
  kafka-init:
    image: apache/kafka:3.9.2
    container_name: kafka-init
    user: "0:0"
    entrypoint: ["/bin/sh", "-c"]
    command: ["chown -R 1000:1000 /tmp/kraft-combined-logs"]
    volumes:
      - kafka_data:/tmp/kraft-combined-logs

  kafka:
    image: apache/kafka:3.9.2
    container_name: kafka
    hostname: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      # Single-node KRaft: this process is both the broker and controller.
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Internal clients use kafka:9092; host clients use localhost:9092.
      KAFKA_LISTENERS: CONTROLLER://:29093,PLAINTEXT_HOST://:9092,PLAINTEXT://:19092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_MIN_INSYNC_REPLICAS: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:19092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy

  schema-registry:
    image: confluentinc/cp-schema-registry:7.9.2
    container_name: schema-registry
    hostname: schema-registry
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:19092
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: "1"
      SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL: BACKWARD
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8081/subjects >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  kafka-topic-init:
    image: apache/kafka:3.9.2
    container_name: kafka-topic-init
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic fraud.transaction --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic fraud.transaction.label --partitions 3 --replication-factor 1
    depends_on:
      kafka:
        condition: service_healthy

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio
    hostname: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio-secret}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    entrypoint: ["/bin/sh"]
    command: ["/opt/fraudguard/init_bucket.sh"]
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio-secret}
      MINIO_AIRFLOW_USER: ${MINIO_AIRFLOW_USER:-fraudguard}
      MINIO_AIRFLOW_PASSWORD: ${MINIO_AIRFLOW_PASSWORD:-fraudguard-secret}
    volumes:
      - ./minIO/init_bucket.sh:/opt/fraudguard/init_bucket.sh:ro
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"

  clickhouse:
    image: clickhouse/clickhouse-server:26.3.17.56
    container_name: clickhouse
    hostname: clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"
      # MinIO already uses host port 9000, so expose ClickHouse native TCP on 9002.
      - "9002:9000"
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-fraudguard}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-fraudguard}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-fraudguard-secret}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
      CLICKHOUSE_LOADER_PASSWORD: ${CLICKHOUSE_LOADER_PASSWORD:?CLICKHOUSE_LOADER_PASSWORD must be set}
      CLICKHOUSE_TRANSFORMER_PASSWORD: ${DBT_CLICKHOUSE_PASSWORD:?DBT_CLICKHOUSE_PASSWORD must be set}
      CLICKHOUSE_SUPERSET_PASSWORD: ${CLICKHOUSE_SUPERSET_PASSWORD:?CLICKHOUSE_SUPERSET_PASSWORD must be set}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init/01_fraudguard_schema.sql:/docker-entrypoint-initdb.d/01_fraudguard_schema.sql:ro
      - ./clickhouse/init/02_init_role_database.sql:/docker-entrypoint-initdb.d/02_init_role_database.sql:ro
      - ./clickhouse/init/03_init_role_users.sh:/docker-entrypoint-initdb.d/03_init_role_users.sh:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test:
        - CMD-SHELL
        - clickhouse-client --user "$$CLICKHOUSE_USER" --password "$$CLICKHOUSE_PASSWORD" --query "SELECT 1" >/dev/null
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  spark-master:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    container_name: spark-master
    hostname: spark-master
    restart: unless-stopped
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    ports:
      - "7077:7077"
      - "8083:8080"
    volumes:
      - ./docker/spark/conf:/opt/spark/conf/custom:ro
      - ./spark/jobs:/opt/spark/jobs:ro
    environment:
      SPARK_CONF_DIR: /opt/spark/conf/custom
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/spark-master/7077'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  spark-worker:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    container_name: spark-worker
    hostname: spark-worker
    restart: unless-stopped
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - --webui-port
      - "8081"
      - --cores
      - "2"
      - --memory
      - 2G
      - spark://spark-master:7077
    ports:
      - "8082:8081"
    environment:
      SPARK_CONF_DIR: /opt/spark/conf/custom
    volumes:
      - ./docker/spark/conf:/opt/spark/conf/custom:ro
      - ./spark/jobs:/opt/spark/jobs:ro
    depends_on:
      spark-master:
        condition: service_healthy

  airflow-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${AIRFLOW_POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    shm_size: 128mb

  airflow-init:
    <<: *airflow-common
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        mkdir -p /opt/airflow/logs /opt/airflow/config
        chown -R "$${AIRFLOW_UID}:0" /opt/airflow/logs /opt/airflow/config
        /entrypoint airflow version
    environment:
      <<: *airflow-common-environment
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ""
    user: "0:0"
    restart: "no"

  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    restart: unless-stopped
    ports:
      - "${AIRFLOW_PORT:-8084}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
      airflow-apiserver:
        condition: service_healthy

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type DagProcessorJob --hostname \"$${HOSTNAME}\""]
      # Airflow CLI needs about 10-15 seconds when the full local stack is running.
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 60s
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type TriggererJob --hostname \"$${HOSTNAME}\""]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 60s
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

volumes:
  kafka_data:
  minio_data:
  clickhouse_data:
  airflow_postgres_data:
  airflow_logs:
  airflow_config:
