services:
  kafka-init:
    image: apache/kafka:3.9.2
    container_name: kafka-init
    user: "0:0"
    entrypoint: ["/bin/sh", "-c"]
    command: ["chown -R 1000:1000 /tmp/kraft-combined-logs"]
    volumes:
      - kafka_data:/tmp/kraft-combined-logs

  kafka:
    image: apache/kafka:3.9.2
    container_name: kafka
    hostname: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      # Single-node KRaft: this process is both the broker and controller.
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Internal clients use kafka:9092; host clients use localhost:9092.
      KAFKA_LISTENERS: CONTROLLER://:29093,PLAINTEXT_HOST://:9092,PLAINTEXT://:19092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_MIN_INSYNC_REPLICAS: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:19092
    depends_on:
      kafka:
        condition: service_healthy

  kafka-topic-init:
    image: apache/kafka:3.9.2
    container_name: kafka-topic-init
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic fraud.transaction --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic fraud.transaction.label --partitions 3 --replication-factor 1
    depends_on:
      kafka:
        condition: service_healthy

  paysim:
    build:
      context: ./paysim
    container_name: paysim
    restart: "no"
    environment:
      PAYSIM_KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      PAYSIM_KAFKA_TRANSACTION_TOPIC: fraud.transaction
      PAYSIM_KAFKA_LABEL_TOPIC: fraud.transaction.label
    command: ["run", "-file", "/app/PaySim.properties", "1"]
    depends_on:
      kafka-topic-init:
        condition: service_completed_successfully

volumes:
  kafka_data:
